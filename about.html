<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>About — Arch!ve-Sense: Diagram Library</title>
  <link rel="stylesheet" href="style.css">
  <!-- marked: Markdown 텍스트를 HTML로 변환 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.0/lib/marked.umd.min.js"></script>
  <!-- DOMPurify: 위험한 스크립트/이벤트 핸들러 제거 -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.3/dist/purify.min.js"></script>
</head>
<!-- about 페이지의 본문은 about.md 파일에서 읽어옵니다.
     내용을 수정할 때는 about.html이 아니라 about.md를 고치세요. -->
<body class="about">
  <nav><a href="index.html">○<span class="shape-lift">△</span>□ 목록</a></nav>

  <main>
    <!-- 좌: About 타이틀 + TOC, 우: 활성 섹션만 보여주는 본문.
         타이틀이 좌측 컬럼 안에 있어 우측 본문이 같은 시작 위치에 정렬된다. -->
    <div class="about-cols">
      <div class="about-side">
        <h1 class="about-title">About</h1>
        <nav class="about-toc">
          <ol></ol>
        </nav>
      </div>
      <div class="about-content">
        <!-- 인트로(첫 ## 이전 내용) + 섹션들이 스크립트로 여기에 채워집니다. -->
      </div>
    </div>
  </main>

  <script>
    // about.md를 불러와 렌더링한다.
    // 1. ## 헤딩 단위로 <section>으로 묶어 박스 스타일을 적용한다.
    // 2. 각 섹션의 id를 헤딩 텍스트에서 자동 만들고, 같은 값으로 TOC 링크도 채운다.
    //    → about.md에서 ## 섹션을 추가/제거하면 TOC도 자동으로 갱신된다.

    // 헤딩 텍스트를 anchor id로 변환 (한글은 그대로 유지, 공백→하이픈, 구두점 제거)
    function slugify(text) {
      return text
        .trim()
        .toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[:;.,!?'"()·—–]/g, '')
        .replace(/^-+|-+$/g, '');
    }

    fetch('about.md')
      .then(r => {
        if (!r.ok) throw new Error('Not found');
        return r.text();
      })
      .then(md => {
        const html = DOMPurify.sanitize(marked.parse(md));
        const temp = document.createElement('div');
        temp.innerHTML = html;

        const main = document.querySelector('main');
        const tocOl = main.querySelector('.about-toc ol');
        const contentEl = main.querySelector('.about-content');

        // 마크다운 결과를 ## 헤딩 단위로 <section>으로 묶는다.
        // 첫 ## 이전의 내용은 인트로로 따로 모아 둔다 (TOC에는 넣지 않음, 항상 표시).
        const intro = document.createElement('div');
        intro.className = 'about-intro';
        const sections = [];
        let current = null;
        Array.from(temp.children).forEach(el => {
          if (el.tagName === 'H2') {
            current = document.createElement('section');
            current.id = slugify(el.textContent);
            sections.push(current);
          }
          (current || intro).appendChild(el);
        });

        if (intro.children.length > 0) contentEl.appendChild(intro);
        sections.forEach(s => contentEl.appendChild(s));

        // TOC: 각 섹션의 h2 텍스트를 링크로 채운다.
        sections.forEach(s => {
          const h2 = s.querySelector('h2');
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = '#' + s.id;
          a.textContent = h2.textContent;
          li.appendChild(a);
          tocOl.appendChild(li);
        });

        // 한 번에 한 섹션만 보이도록 .active 토글.
        // URL 해시가 비어 있으면 첫 섹션(프로젝트 소개)을 기본으로 보여준다.
        function showSection(id) {
          const target = sections.find(s => s.id === id) || sections[0];
          if (!target) return;
          sections.forEach(s => s.classList.toggle('active', s === target));
          tocOl.querySelectorAll('a').forEach(a => {
            a.classList.toggle('active', a.getAttribute('href') === '#' + target.id);
          });
        }

        // hash 변경(TOC 클릭, 뒤로가기 등) 감지해 active 섹션 갱신.
        // 해시는 한글이면 URL-encoded로 들어오므로 decode해서 매칭한다.
        // 섹션 전환 시 스크롤을 페이지 상단으로 — 새 섹션을 처음부터 읽을 수 있게.
        window.addEventListener('hashchange', () => {
          showSection(decodeURIComponent(location.hash.slice(1)));
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        showSection(decodeURIComponent(location.hash.slice(1)));
      })
      .catch(() => {
        document.querySelector('main').textContent = 'about.md를 불러올 수 없습니다.';
      });
  </script>
</body>
</html>
